name: travel-platform-ci-cd

on:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/deploy_app.sh"
      - ".github/workflows/deploy.yml"
      - ".terraform.lock.hcl"
      - "app/**"
      - "main.tf"
      - "outputs.tf"
      - "scripts/check_lambda_package.sh"
      - "scripts/package_lambda.sh"
      - "terraform/**"
      - "variables.tf"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC lets GitHub assume the deploy role without long-lived AWS keys.
  contents: read    # Required for actions/checkout.

env:
  AWS_REGION: ap-south-2

  ECR_REGISTRY: 949474133081.dkr.ecr.ap-south-2.amazonaws.com

  APP_REPOSITORY: travel-app-repo

  IMAGE_TAG: ${{ github.sha }}

jobs:
  validate:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_EC2_METADATA_DISABLED: true
      DB_HOST: localhost
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      BUCKET_NAME: travel-platform-assets-952341

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt

      - name: Compile Python
        run: |
          python -m compileall app terraform/compute/lambda/lambda_function.py tests

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Check Lambda package freshness
        run: |
          ./scripts/check_lambda_package.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: |
          terraform fmt -check -recursive

      - name: Terraform init root stack
        run: |
          terraform init -backend=false

      - name: Terraform validate root stack
        run: |
          terraform validate

      - name: Terraform init ECR stack
        run: |
          terraform -chdir=terraform/ecr init -backend=false

      - name: Terraform validate ECR stack
        run: |
          terraform -chdir=terraform/ecr validate

  build-and-push:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::949474133081:role/travel_platform_github_role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t $ECR_REGISTRY/$APP_REPOSITORY:latest ./app

      - name: Tag images
        run: |
          docker tag $ECR_REGISTRY/$APP_REPOSITORY:latest $ECR_REGISTRY/$APP_REPOSITORY:$IMAGE_TAG

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$APP_REPOSITORY:latest
          docker push $ECR_REGISTRY/$APP_REPOSITORY:$IMAGE_TAG

      - name: Trigger SSM Deployment
        run: |
          # Ship the repo version of the deploy script to EC2 so CI remains the deployment source of truth.
          DEPLOY_SCRIPT_B64="$(base64 < .github/scripts/deploy_app.sh | tr -d '\n')"
          COMMANDS="$(jq -n \
            --arg script "$DEPLOY_SCRIPT_B64" \
            --arg image_tag "$IMAGE_TAG" \
            '{
              commands: [
                "set -e",
                "printf %s " + ($script | @sh) + " | base64 -d > /home/ec2-user/deploy_app.sh",
                "chmod +x /home/ec2-user/deploy_app.sh",
                "/home/ec2-user/deploy_app.sh " + ($image_tag | @sh),
                "cp /home/ec2-user/deploy_app.sh /home/ec2-user/update_app.sh"
              ]
            }')"

          aws ssm send-command \
          --document-name "AWS-RunShellScript" \
          --targets "Key=tag:Role,Values=app" \
          --parameters "$COMMANDS" \
          --region ${{ env.AWS_REGION }}
